name: Databricks Notebook CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          repository: /Workspace/Users/saireddygaddam123@gmail.com/DEV-CICD-DB-GIT-FOLDER  # Replace with your repo path

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: pip install databricks-cli

      - name: Configure Databricks CLI for Dev
        env:
          DATABRICKS_HOST: ${{ secrets.DEV_DEPLOYMENT_URL }}
          DATABRICKS_TOKEN: ${{ secrets.DEV_DEPLOYMENT_TOKEN }}
        run: |
          databricks configure --token

      - name: Deploy to Development
        run: |
          # Use the repository path to deploy notebooks to dev
          echo "Deploying notebooks to development"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          repository: /Workspace/Users/saireddygaddam123@gmail.com/PROD-CICD-DB-GIT-FOLDER  # Replace with your repo path

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: pip install databricks-cli

      - name: Configure Databricks CLI for Prod
        env:
          DATABRICKS_HOST: ${{ secrets.PROD_DEPLOYMENT_URL }}
          DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOYMENT_TOKEN }}
        run: |
          databricks configure --token

      - name: Deploy to Production
        run: |
          # Use the repository path to deploy notebooks to prod
          echo "Deploying notebooks to production"
