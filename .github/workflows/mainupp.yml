name: Databricks Notebook CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    env:
      DATABRICKS_HOST: ${{ secrets.DEV_DEPLOYMENT_URL }}
      DATABRICKS_TOKEN: ${{ secrets.DEV_DEPLOYMENT_TOKEN }}
      REPO_PATH: "/Workspace/Users/saireddygaddam123@gmail.com/DEV-CICD-DB-GIT-FOLDER"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.8

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Extract branch name
        id: extract_branch
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Update Databricks Repo (Dev)
        run: |
          databricks repos update "${REPO_PATH}" \
            --branch "${{ env.branch }}"

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABRICKS_HOST: ${{ secrets.PROD_DEPLOYMENT_URL }}
      DATABRICKS_TOKEN: ${{ secrets.PROD_DEPLOYMENT_TOKEN }}
      REPO_PATH: "/Workspace/Users/saireddygaddam123@gmail.com/PROD-CICD-DB-GIT-FOLDER"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.8

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Update Databricks Repo (Prod)
        run: |
          databricks repos update "${REPO_PATH}" \
            --branch "${{ env.branch }}"
